<body class="antialiased min-h-screen flex flex-col pt-16 pb-[84px] selection:bg-primary-container selection:text-on-primary-container relative">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[40vw] h-[40vw] rounded-full bg-primary-container/10 blur-[80px]"></div>
<div class="absolute bottom-[20%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-secondary-container/10 blur-[100px]"></div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding h-16 bg-surface/80 dark:bg-surface-container/80 backdrop-blur-xl border-b border-white/40 dark:border-white/10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary dark:text-inverse-primary" style="font-variation-settings: 'FILL' 0;">functions</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-inverse-primary tracking-tight">离散数学刷题系统</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors">
<span class="material-symbols-outlined text-on-surface-variant dark:text-surface-variant" style="font-variation-settings: 'FILL' 0;">light_mode</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 w-full max-w-5xl mx-auto px-container-padding py-section-margin z-10 flex flex-col gap-stack-gap h-full">
<!-- Page Title Area -->
<div class="mb-4">
<h2 class="font-display-lg text-display-lg text-on-surface">模拟考试</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">全真模拟环境，检验学习成果</p>
</div>
<!-- Rule Description Card (Glassmorphism) -->
<div class="glass-panel rounded-xl p-glass-padding flex flex-col md:flex-row gap-6 items-start md:items-center">
<div class="w-16 h-16 rounded-full bg-primary-container/20 flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">assignment</span>
</div>
<div class="flex-1">
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-2">考试规则说明</h3>
<ul class="font-body-md text-body-md text-on-surface-variant space-y-2">
<li class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary" style="font-variation-settings: 'FILL' 0;">check_circle</span>
                        随机抽取 <strong>20道</strong> 涵盖各章节的核心题目
                    </li>
<li class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary" style="font-variation-settings: 'FILL' 0;">check_circle</span>
                        满分 <strong>100分</strong>，客观题自动判卷
                    </li>
<li class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary" style="font-variation-settings: 'FILL' 0;">check_circle</span>
                        限时 <strong>60分钟</strong>，超时自动交卷
                    </li>
</ul>
</div>
</div>
<!-- History Stats Grid (Bento Grid Style) -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-inline-gap mt-4">
<div class="glass-panel rounded-xl p-glass-padding flex flex-col items-center justify-center text-center relative overflow-hidden group">
<div class="absolute -right-4 -top-4 w-24 h-24 bg-primary/5 rounded-full transition-transform group-hover:scale-150"></div>
<span class="material-symbols-outlined text-primary mb-2 text-3xl" style="font-variation-settings: 'FILL' 0;">emoji_events</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-1">最高分</span>
<div class="font-display-lg text-display-lg text-primary flex items-baseline gap-1">
                    95<span class="font-body-md text-body-md">分</span>
</div>
</div>
<div class="glass-panel rounded-xl p-glass-padding flex flex-col items-center justify-center text-center relative overflow-hidden group">
<div class="absolute -left-4 -bottom-4 w-24 h-24 bg-secondary/5 rounded-full transition-transform group-hover:scale-150"></div>
<span class="material-symbols-outlined text-secondary mb-2 text-3xl" style="font-variation-settings: 'FILL' 0;">analytics</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-1">平均分</span>
<div class="font-display-lg text-display-lg text-secondary flex items-baseline gap-1">
                    82<span class="font-body-md text-body-md">分</span>
</div>
</div>
<div class="glass-panel rounded-xl p-glass-padding flex flex-col items-center justify-center text-center relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-tertiary-fixed/30 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-tertiary mb-2 text-3xl" style="font-variation-settings: 'FILL' 0;">history</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-1">考试次数</span>
<div class="font-display-lg text-display-lg text-tertiary flex items-baseline gap-1">
                    12<span class="font-body-md text-body-md">次</span>
</div>
</div>
</div>
<!-- Spacer to push button to bottom if content is short -->
<div class="flex-1 min-h-[40px]"></div>
<!-- Start Button Area -->
<div class="flex justify-center mt-auto mb-8">
<button class="bg-primary text-on-primary font-headline-sm text-headline-sm py-4 px-12 rounded-full glow-button hover:-translate-y-1 hover:shadow-lg transition-all duration-300 flex items-center gap-3 w-full md:w-auto md:min-w-[320px] justify-center relative overflow-hidden group">
<span class="absolute inset-0 w-full h-full bg-white/20 scale-x-0 group-hover:scale-x-100 origin-left transition-transform duration-500 ease-out"></span>
<span class="material-symbols-outlined relative z-10" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="relative z-10">开始组卷并考试</span>
</button>
</div>

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu_book</span>

<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">quiz</span>
<span class="font-label-md text-label-md mt-1 text-primary">模考</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-tertiary-container hover:bg-on-surface/5 dark:hover:bg-on-surface/10 rounded-full w-16 h-14 transition-colors" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">leaderboard</span>

<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-tertiary-container hover:bg-on-surface/5 dark:hover:bg-on-surface/10 rounded-full w-16 h-14 transition-colors" href="#">
