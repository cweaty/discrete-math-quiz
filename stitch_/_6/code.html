<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>刷题界面 - 离散数学</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" rel="stylesheet"/>
<script defer="" src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<script defer="" onload="renderMathInElement(document.body);" src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#4953bc",
                        "on-secondary-container": "#17228f",
                        "secondary-container": "#8792fe",
                        "surface-bright": "#f9f9ff",
                        "surface-dim": "#cfdaf2",
                        "surface-container-highest": "#d8e3fb",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#dee8ff",
                        "on-error-container": "#93000a",
                        "inverse-on-surface": "#ecf1ff",
                        "primary-fixed-dim": "#c3c0ff",
                        "background": "#f9f9ff",
                        "outline-variant": "#c7c4d8",
                        "on-secondary-fixed": "#000767",
                        "surface-variant": "#d8e3fb",
                        "on-primary-fixed": "#0f0069",
                        "secondary-fixed": "#e0e0ff",
                        "surface": "#f9f9ff",
                        "tertiary": "#45484f",
                        "outline": "#777587",
                        "on-secondary-fixed-variant": "#2f3aa3",
                        "tertiary-container": "#5d6067",
                        "surface-tint": "#4d44e3",
                        "surface-container": "#e7eeff",
                        "secondary-fixed-dim": "#bdc2ff",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#e2dfff",
                        "on-surface-variant": "#464555",
                        "on-tertiary-fixed-variant": "#43474d",
                        "on-secondary": "#ffffff",
                        "on-background": "#111c2d",
                        "tertiary-fixed-dim": "#c4c6ce",
                        "on-error": "#ffffff",
                        "primary": "#3525cd",
                        "on-primary-fixed-variant": "#3323cc",
                        "tertiary-fixed": "#e0e2ea",
                        "on-tertiary-fixed": "#181c21",
                        "on-tertiary-container": "#d9dbe3",
                        "surface-container-low": "#f0f3ff",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#4f46e5",
                        "on-primary-container": "#dad7ff",
                        "inverse-surface": "#263143",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#c3c0ff",
                        "on-surface": "#111c2d",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "20px",
                        "inline-gap": "12px",
                        "section-margin": "32px",
                        "glass-padding": "16px",
                        "stack-gap": "16px"
                    },
                    "fontFamily": {
                        "display-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "math-display": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "math-display": ["18px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: theme('colors.background'); }
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .option-card:hover {
            transform: scale(0.98);
            border-color: theme('colors.primary');
            background-color: rgba(79, 70, 229, 0.05);
        }
        .option-selected {
            border-color: theme('colors.primary');
            background-color: rgba(79, 70, 229, 0.1);
            transform: scale(0.98);
        }
        .ai-fab-shadow { box-shadow: 0 8px 30px rgba(79, 70, 229, 0.2); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="text-on-background min-h-screen pb-[120px] font-body-md">
<!-- Top Navigation (Task-focused, so no global shell, custom header) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding h-16 bg-surface/80 backdrop-blur-xl border-b border-white/40 shadow-sm transition-all duration-300">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-variant transition-colors text-on-surface">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<div class="flex items-center gap-2">
<span class="bg-primary/10 text-primary px-3 py-1 rounded-full font-label-md text-label-md">命题逻辑</span>
<span class="bg-surface-variant text-on-surface-variant px-3 py-1 rounded-full font-label-md text-label-md">中等</span>
</div>
<span class="font-label-md text-label-md text-outline mt-1">1 / 15</span>
</div>
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-variant transition-colors text-on-surface">
<span class="material-symbols-outlined" data-icon="star">star</span>
</button>
</header>
<main class="pt-[80px] px-container-padding max-w-3xl mx-auto flex flex-col gap-stack-gap">
<!-- Question Card -->
<section class="glass-panel rounded-2xl p-glass-padding relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-4">选择题</h2>
<div class="font-math-display text-math-display text-on-surface-variant leading-relaxed space-y-4 prose">
<p>设 P 和 Q 为命题变量，请问以下哪个逻辑等式代表了德·摩根定律 (De Morgan's Laws) 的其中一种形式？</p>
<p>请仔细观察下面的复合命题，并选择在逻辑上等价于 <strong>$$ \neg(P \lor Q) $$</strong> 的选项。</p>
</div>
</section>
<!-- Options Container -->
<section class="flex flex-col gap-inline-gap">
<!-- Option A -->
<button class="option-card w-full text-left glass-panel rounded-2xl p-glass-padding flex items-center gap-4 transition-all duration-200 min-h-[56px]">
<div class="w-10 h-10 rounded-full border border-outline flex items-center justify-center font-headline-sm text-headline-sm text-on-surface-variant shrink-0">A</div>
<span class="font-math-display text-math-display text-on-surface">$$ \neg P \lor \neg Q $$</span>
</button>
<!-- Option B -->
<button class="option-card w-full text-left glass-panel rounded-2xl p-glass-padding flex items-center gap-4 transition-all duration-200 min-h-[56px]">
<div class="w-10 h-10 rounded-full border border-outline flex items-center justify-center font-headline-sm text-headline-sm text-on-surface-variant shrink-0">B</div>
<span class="font-math-display text-math-display text-on-surface">$$ \neg P \land \neg Q $$</span>
</button>
<!-- Option C -->
<button class="option-card w-full text-left glass-panel rounded-2xl p-glass-padding flex items-center gap-4 transition-all duration-200 min-h-[56px]">
<div class="w-10 h-10 rounded-full border border-outline flex items-center justify-center font-headline-sm text-headline-sm text-on-surface-variant shrink-0">C</div>
<span class="font-math-display text-math-display text-on-surface">$$ P \land Q $$</span>
</button>
<!-- Option D -->
<button class="option-card w-full text-left glass-panel rounded-2xl p-glass-padding flex items-center gap-4 transition-all duration-200 min-h-[56px]">
<div class="w-10 h-10 rounded-full border border-outline flex items-center justify-center font-headline-sm text-headline-sm text-on-surface-variant shrink-0">D</div>
<span class="font-math-display text-math-display text-on-surface">$$ \neg(P \land Q) $$</span>
</button>
</section>
<!-- Discussion Entry -->
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-2xl text-primary hover:bg-surface-variant transition-colors mt-2 self-start">
<span>💬</span>
<span class="font-body-md text-body-md font-medium">题目讨论 (12)</span>
</button>
</main>
<!-- Bottom Control Bar -->
<div class="fixed bottom-0 w-full glass-panel border-t border-white/40 p-container-padding flex justify-between items-center gap-4 z-40 pb-[env(safe-area-inset-bottom,20px)] rounded-t-2xl">
<button class="flex-1 py-3 px-4 rounded-2xl border border-outline-variant text-on-surface-variant font-headline-sm text-headline-sm hover:bg-surface-variant transition-colors min-h-[56px]">
            上一题
        </button>
<button class="flex-1 py-3 px-4 rounded-2xl bg-primary text-on-primary font-headline-sm text-headline-sm hover:bg-primary/90 transition-colors shadow-sm min-h-[56px]">
            提交答案
        </button>
<button class="flex-1 py-3 px-4 rounded-2xl border border-outline-variant text-on-surface-variant font-headline-sm text-headline-sm hover:bg-surface-variant transition-colors min-h-[56px]">
            下一题
        </button>
</div>
<!-- AI Assistant FAB -->
<button class="fixed bottom-[110px] right-container-padding w-14 h-14 rounded-full glass-panel ai-fab-shadow flex items-center justify-center z-50 hover:scale-105 transition-transform bg-white/70 border-primary/20 backdrop-blur-xl">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="smart_toy">smart_toy</span>
</button>
<script>
        // Simple micro-interaction for option selection
        document.querySelectorAll('.option-card').forEach(card => {
            card.addEventListener('click', function() {
                // Remove selection from all
                document.querySelectorAll('.option-card').forEach(c => {
                    c.classList.remove('option-selected');
                    c.querySelector('div').classList.remove('bg-primary', 'text-on-primary', 'border-primary');
                    c.querySelector('div').classList.add('border-outline', 'text-on-surface-variant');
                });
                
                // Add to clicked
                this.classList.add('option-selected');
                const indicator = this.querySelector('div');
                indicator.classList.remove('border-outline', 'text-on-surface-variant');
                indicator.classList.add('bg-primary', 'text-on-primary', 'border-primary');
            });
        });
    </script>
</body></html>
