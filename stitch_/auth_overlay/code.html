<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Discrete Math App - Auth Overlay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-secondary-container": "#17228f",
                      "on-primary-fixed-variant": "#3323cc",
                      "inverse-surface": "#263143",
                      "primary": "#3525cd",
                      "on-surface-variant": "#464555",
                      "outline": "#777587",
                      "on-surface": "#111c2d",
                      "on-secondary-fixed": "#000767",
                      "on-primary-container": "#dad7ff",
                      "inverse-on-surface": "#ecf1ff",
                      "secondary-fixed-dim": "#bdc2ff",
                      "error": "#ba1a1a",
                      "on-tertiary-fixed": "#181c21",
                      "tertiary-fixed": "#e0e2ea",
                      "surface-container-high": "#dee8ff",
                      "surface-container-lowest": "#ffffff",
                      "on-primary": "#ffffff",
                      "surface-container": "#e7eeff",
                      "surface-bright": "#f9f9ff",
                      "primary-fixed-dim": "#c3c0ff",
                      "surface-container-highest": "#d8e3fb",
                      "on-error-container": "#93000a",
                      "primary-fixed": "#e2dfff",
                      "primary-container": "#4f46e5",
                      "secondary": "#4953bc",
                      "secondary-fixed": "#e0e0ff",
                      "tertiary-fixed-dim": "#c4c6ce",
                      "on-secondary": "#ffffff",
                      "on-error": "#ffffff",
                      "error-container": "#ffdad6",
                      "surface-tint": "#4d44e3",
                      "inverse-primary": "#c3c0ff",
                      "surface-dim": "#cfdaf2",
                      "surface": "#f9f9ff",
                      "secondary-container": "#8792fe",
                      "on-secondary-fixed-variant": "#2f3aa3",
                      "on-background": "#111c2d",
                      "surface-variant": "#d8e3fb",
                      "tertiary": "#45484f",
                      "on-tertiary": "#ffffff",
                      "on-primary-fixed": "#0f0069",
                      "on-tertiary-fixed-variant": "#43474d",
                      "tertiary-container": "#5d6067",
                      "surface-container-low": "#f0f3ff",
                      "outline-variant": "#c7c4d8",
                      "background": "#f9f9ff",
                      "on-tertiary-container": "#d9dbe3"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px",
                      "24": "24px"
              },
              "spacing": {
                      "inline-gap": "12px",
                      "glass-padding": "16px",
                      "section-margin": "32px",
                      "container-padding": "20px",
                      "stack-gap": "16px",
                      "touch-target": "48px"
              },
              "fontFamily": {
                      "headline-sm": ["Inter"],
                      "display-lg": ["Inter"],
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-md": ["Inter"],
                      "math-display": ["Inter"],
                      "label-md": ["Inter"]
              },
              "fontSize": {
                      "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "math-display": ["18px", {"lineHeight": "28px", "fontWeight": "500"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]
              }
            }
          }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        
        .input-glow:focus-within {
            border-color: #3525cd;
            box-shadow: 0 0 0 1px #3525cd;
        }
        
        .primary-shadow {
            box-shadow: 0 8px 30px rgba(79, 70, 229, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen font-body-md text-on-background antialiased relative">
<!-- Background Layer (Simulating Blurred Lobby) -->
<div class="fixed inset-0 z-0">
<img class="w-full h-full object-cover filter blur-sm opacity-60" data-alt="A blurred abstract representation of a modern digital academic workspace. Light, airy atmosphere with subtle geometric shapes and soft pastel gradients in whites and light blues, evoking a sense of calm focus for mathematics students. High-key lighting, out of focus." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAM7K77fFq57fsqAJcuJJi6doIT3QBPjnMHQvEHcEsiGKzIa4Nw9V7J9-LlHlBhD2MtFzAqniPB_Bwtlu8nwCMuDOFBCB4koNzGD3-q3YhLN7GsL5U7xeiid5Z_7IPpx4qa0BdR9yWEhLNXGIJ9gx0d38932S56p1JvIbpyLS0LSMJsBi_QuSP37MgP9eH2fC4ltQa9ZvKMlVfzdN4LRLkYhfApqDDMt217ipnrh6rKKql4w4MEG2SdAqt88U5R-3ezsoPUD0KVCV8"/>
</div>
<!-- Auth Overlay Container -->
<div class="fixed inset-0 z-10 flex items-center justify-center p-container-padding bg-on-background/10 backdrop-blur-md">
<!-- Auth Card (Glassmorphism) -->
<div class="glass-panel w-full max-w-sm rounded-24 p-section-margin primary-shadow relative overflow-hidden">
<!-- Header / Toggle -->
<div class="mb-section-margin relative">
<div class="flex bg-surface-container-high rounded-full p-1 relative z-10">
<!-- Sliding Background -->
<div class="absolute w-[calc(50%-4px)] h-[calc(100%-8px)] top-1 left-1 bg-surface-container-lowest rounded-full shadow-sm transition-transform duration-300 ease-in-out" id="toggle-slider"></div>
<button class="flex-1 py-2 text-center font-label-md text-primary relative z-20 transition-colors duration-200" id="btn-login" onclick="switchTab('login')">
                        登录
                    </button>
<button class="flex-1 py-2 text-center font-label-md text-on-surface-variant relative z-20 transition-colors duration-200" id="btn-signup" onclick="switchTab('signup')">
                        注册
                    </button>
</div>
</div>
<!-- Form Content -->
<form class="flex flex-col gap-stack-gap">
<!-- Username Input -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-on-surface-variant ml-1">用户名</label>
<div class="relative flex items-center bg-surface-container-low border border-outline-variant rounded-lg input-glow transition-all duration-200 h-touch-target overflow-hidden">
<span class="material-symbols-outlined text-outline ml-3">person</span>
<input class="w-full bg-transparent border-none focus:ring-0 font-body-lg text-on-surface px-3 placeholder:text-outline-variant" placeholder="输入您的用户名" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-on-surface-variant ml-1">密码</label>
<div class="relative flex items-center bg-surface-container-low border border-outline-variant rounded-lg input-glow transition-all duration-200 h-touch-target overflow-hidden">
<span class="material-symbols-outlined text-outline ml-3">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 font-body-lg text-on-surface px-3 placeholder:text-outline-variant" placeholder="输入您的密码" type="password"/>
</div>
</div>
<!-- Optional Extra Field for Sign Up (Hidden initially) -->
<div class="hidden flex-col gap-1 origin-top transition-all duration-300" id="signup-fields">
<label class="font-label-md text-on-surface-variant ml-1">确认密码</label>
<div class="relative flex items-center bg-surface-container-low border border-outline-variant rounded-lg input-glow transition-all duration-200 h-touch-target overflow-hidden">
<span class="material-symbols-outlined text-outline ml-3">lock_reset</span>
<input class="w-full bg-transparent border-none focus:ring-0 font-body-lg text-on-surface px-3 placeholder:text-outline-variant" placeholder="再次输入密码" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="mt-4 bg-primary text-on-primary font-headline-sm h-touch-target rounded-full w-full flex items-center justify-center gap-2 primary-shadow hover:bg-primary-container active:scale-95 transition-all duration-200" type="button">
<span>进入系统</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Subtle Decorative Elements -->
<div class="absolute -bottom-10 -right-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl pointer-events-none"></div>
<div class="absolute -top-10 -left-10 w-24 h-24 bg-secondary-container/10 rounded-full blur-xl pointer-events-none"></div>
</div>
</div>
<script>
        function switchTab(tab) {
            const slider = document.getElementById('toggle-slider');
            const btnLogin = document.getElementById('btn-login');
            const btnSignup = document.getElementById('btn-signup');
            const signupFields = document.getElementById('signup-fields');

            if (tab === 'login') {
                slider.style.transform = 'translateX(0)';
                btnLogin.classList.add('text-primary');
                btnLogin.classList.remove('text-on-surface-variant');
                btnSignup.classList.add('text-on-surface-variant');
                btnSignup.classList.remove('text-primary');
                
                signupFields.classList.add('hidden');
                signupFields.classList.remove('flex');
            } else {
                slider.style.transform = 'translateX(calc(100% + 2px))'; // Adjust for padding
                btnSignup.classList.add('text-primary');
                btnSignup.classList.remove('text-on-surface-variant');
                btnLogin.classList.add('text-on-surface-variant');
                btnLogin.classList.remove('text-primary');
                
                signupFields.classList.remove('hidden');
                signupFields.classList.add('flex');
            }
        }
    </script>
</body></html>
